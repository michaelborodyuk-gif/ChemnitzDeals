<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chemnitz Deals</title>
    <style>
      body { margin: 0; background: #FFFFFF; color: #0A0A0A; font-family: 'Inter', system-ui, sans-serif; }
      .app-loader { display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; gap: 16px; }
      .app-loader h1 { font-size: 24px; font-weight: 900; }
      .app-loader p { font-size: 14px; color: #6B6B6B; }
      .spinner { width: 32px; height: 32px; border: 3px solid #E5E7EB; border-top-color: #E63946; border-radius: 50%; animation: spin 0.8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-loader">
        <h1>Chemnitz Deals</h1>
        <div class="spinner"></div>
        <p>Wird geladen...</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
